
<style>
  .wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .controls button { font-size: 13px; }
  .controls button.active { background: var(--bg-accent); color: var(--text-accent); border-color: var(--border-accent); }
  canvas { border-radius: 12px; border: 0.5px solid var(--border); background: var(--surface-1); display: block; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .leg-line { width: 20px; height: 2px; flex-shrink: 0; }
  .insight { font-size: 13px; color: var(--text-secondary); margin-top: 10px; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface-2); min-height: 38px; transition: opacity 0.2s; }
</style>

<div class="wrap">
  <h2 class="sr-only">Full-document embedding vs chunk vectors</h2>

  <div class="controls">
    <button id="btn-full" class="active" onclick="setMode('full')">Full document</button>
    <button id="btn-chunks" onclick="setMode('chunks')">After chunking</button>
  </div>

  <canvas id="plot" width="640" height="320"></canvas>

  <div class="legend" id="legend"></div>
  <div class="insight" id="insight"></div>
</div>

<script>
const isDark = () => matchMedia('(prefers-color-scheme: dark)').matches;

const CHUNKS = [
  { id: 'C1', label: 'Vacation chunk',       vec: [0.85, 0.22],  color: '#2a78d6' },
  { id: 'C2', label: 'Referral chunk',        vec: [0.18, 0.88],  color: '#1baf7a' },
  { id: 'C3', label: 'Corporate card chunk',  vec: [0.55, 0.62],  color: '#eda100' },
];

const FULL_DOC = {
  id: 'D',
  label: 'Full document (average)',
  vec: [
    (0.85 + 0.18 + 0.55) / 3,
    (0.22 + 0.88 + 0.62) / 3,
  ],
  color: '#888780',
};

const QUERY = { id: 'Q', label: 'Query: "How many vacation days?"', vec: [0.88, 0.15], color: '#e34948' };

function cosine(a, b) {
  let dot = 0, ma = 0, mb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; ma += a[i]*a[i]; mb += b[i]*b[i]; }
  return dot / (Math.sqrt(ma) * Math.sqrt(mb));
}

let mode = 'full';

function setMode(m) {
  mode = m;
  document.getElementById('btn-full').classList.toggle('active', m === 'full');
  document.getElementById('btn-chunks').classList.toggle('active', m === 'chunks');
  draw();
}

function draw() {
  const canvas = document.getElementById('plot');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const dark = isDark();
  const gridC = dark ? '#2c2c2a' : '#e1e0d9';
  const axisC = dark ? '#383835' : '#c3c2b7';
  const textC = dark ? '#898781' : '#898781';
  const fgC   = dark ? '#ffffff' : '#0b0b0b';

  const cx = W * 0.15, cy = H * 0.85, scale = Math.min(W, H) * 0.72;

  // grid
  ctx.strokeStyle = gridC; ctx.lineWidth = 0.5;
  for (let x = cx; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = cy; y > 0; y -= 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // axes
  ctx.strokeStyle = axisC; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx, H); ctx.lineTo(cx, 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W-10, cy); ctx.stroke();
  ctx.fillStyle = textC; ctx.font = '11px sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('dim 1 →', W - 28, cy - 6);
  ctx.textAlign = 'left';   ctx.fillText('dim 2 ↑', cx + 6, 16);

  function toX(v) { return cx + v * scale; }
  function toY(v) { return cy - v * scale; }

  function drawArrow(vec, color, label, dashed, thick) {
    const ex = toX(vec[0]), ey = toY(vec[1]);
    ctx.beginPath();
    ctx.setLineDash(dashed ? [5, 4] : []);
    ctx.strokeStyle = color;
    ctx.lineWidth = thick ? 2.5 : 1.8;
    ctx.moveTo(cx, cy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.setLineDash([]);
    const angle = Math.atan2(cy - ey, ex - cx);
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - 9 * Math.cos(angle - 0.35), ey + 9 * Math.sin(angle - 0.35));
    ctx.lineTo(ex - 9 * Math.cos(angle + 0.35), ey + 9 * Math.sin(angle + 0.35));
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();

    const lx = cx + (vec[0]) * scale * 1.12;
    const ly = cy - (vec[1]) * scale * 1.12;
    ctx.fillStyle = fgC; ctx.font = '12px sans-serif';
    ctx.textAlign = lx > cx ? 'left' : 'right';
    ctx.fillText(label, lx + (lx > cx ? 4 : -4), ly + 4);
  }

  // similarity arc between query and a vector
  function drawSimilarityLabel(vec, color, sim) {
    const mx = cx + (vec[0] + QUERY.vec[0]) / 2 * scale * 0.55;
    const my = cy - (vec[1] + QUERY.vec[1]) / 2 * scale * 0.55;
    ctx.fillStyle = color;
    ctx.font = '500 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(sim.toFixed(2), mx, my);
  }

  if (mode === 'full') {
    drawArrow(FULL_DOC.vec, FULL_DOC.color, 'D (full doc)', false, true);
    drawArrow(QUERY.vec, QUERY.color, 'Q', true, false);
    const sim = cosine(FULL_DOC.vec, QUERY.vec);
    drawSimilarityLabel(FULL_DOC.vec, FULL_DOC.color, sim);

    document.getElementById('insight').textContent =
      `The full document vector sits between all three topics - besides vacation is pulled toward referrals and corporate card too.It averages the meaning.
       The answer is in the document, but the vector doesn't point where the query is looking.`;

    document.getElementById('legend').innerHTML = `
      <div class="leg-item"><span class="leg-dot" style="background:#888780"></span>D - full document (averaged)</div>
      <div class="leg-item"><span class="leg-line" style="background:#e34948;border-top:2px dashed #e34948;height:0"></span>&nbsp;Q - query</div>
    `;

  } else {
    CHUNKS.forEach(c => drawArrow(c.vec, c.color, c.id, false, true));
    drawArrow(QUERY.vec, QUERY.color, 'Q', true, false);

    const sims = CHUNKS.map(c => ({ ...c, sim: cosine(c.vec, QUERY.vec) }));
    sims.forEach(c => drawSimilarityLabel(c.vec, c.color, c.sim));

    const best = sims.reduce((a, b) => a.sim > b.sim ? a : b);
    document.getElementById('insight').textContent =
      `Each chunk has its own precise vector. C1 (vacation) scores ${sims[0].sim.toFixed(3)} — much closer to the query. The retriever finds the right chunk immediately.`;

    document.getElementById('legend').innerHTML = CHUNKS.map(c =>
      `<div class="leg-item"><span class="leg-dot" style="background:${c.color}"></span>${c.id} - ${c.label}</div>`
    ).join('') +
        `<div class="leg-item"><span class="leg-line" style="background:#e34948;border-top:2px dashed #e34948;height:0"></span>&nbsp;Q - query</div>`;
  }
}

draw();
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);
</script>
