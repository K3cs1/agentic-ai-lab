<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html">
<head>
<meta charset="UTF-8">
<title>Temperature Sampling Demo</title>
<style>
body { font-family: Arial, sans-serif; margin: 30px; }
table { border-collapse: collapse; margin-bottom: 20px; }
th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: center; }
canvas { border: 1px solid #ddd; }
.controls { margin: 20px 0; }
</style>
</head>
<body>
<p>
  <b>Most children like ice cream with ....</b>
</p>


<table style="width:100%; border-collapse:collapse; border:none;">
  <tr>
    <td style="padding:0; border:none; vertical-align:middle;">
      <table style="width:100%; border-collapse:collapse;">
        <tr>
          <th style="padding:8px;">Flavor</th>
          <th style="padding:8px;">Logit</th>
          <th style="padding:8px;">Raw Probability (%)</th>
        </tr>
        <tr>
          <td style="padding:8px;">Chocolate</td>
          <td style="padding:8px;">13.912</td>
          <td style="padding:8px;">50</td>
        </tr>
        <tr>
          <td style="padding:8px;">Vanilla</td>
          <td style="padding:8px;">13.401</td>
          <td style="padding:8px;">30</td>
        </tr>
        <tr>
          <td style="padding:8px;">Strawberry</td>
          <td style="padding:8px;">12.708</td>
          <td style="padding:8px;">15</td>
        </tr>
        <tr>
          <td style="padding:8px;">Broccoli</td>
          <td style="padding:8px;">11.386</td>
          <td style="padding:8px;">4</td>
        </tr>
        <tr>
          <td style="padding:8px;">Mud</td>
          <td style="padding:8px;">10.000</td>
          <td style="padding:8px;">1</td>
        </tr>
      </table>
    </td>

    <td style="padding:0; border:none; vertical-align:middle;">
      <img src="softmax.webp" alt="Softmax formula" style="display:block;">
    </td>
  </tr>
</table>

<div class="controls">
<label><b>Temperature:</b> <span id="tempValue">1.0</span></label><br>
<input type="range" id="temp" min="0.1" max="3.0" step="0.1" value="1.0" style="width:500px;">
</div>

<canvas id="chart" width="800" height="400" style="border:none;"></canvas>

<script>
const labels = ["Chocolate","Vanilla","Strawberry","Broccoli","Mud"];
const base = [0.50,0.30,0.15,0.04,0.01];

function applyTemperature(probs, temp) {
    const scaled = probs.map(p => Math.pow(p, 1/temp));
    const sum = scaled.reduce((a,b)=>a+b,0);
    return scaled.map(v => v / sum);
}

function draw(temp) {
    document.getElementById("tempValue").textContent = temp.toFixed(1);

    const probs = applyTemperature(base, temp);
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const left = 70;
    const bottom = 350;
    const width = 650;
    const height = 280;

    ctx.beginPath();
    ctx.moveTo(left, 50);
    ctx.lineTo(left, bottom);
    ctx.lineTo(left + width, bottom);
    ctx.stroke();

    const barWidth = 80;
    const gap = 40;

    probs.forEach((p, i) => {
        const x = left + 30 + i * (barWidth + gap);
        const h = p * height;
        const y = bottom - h;

        ctx.fillRect(x, y, barWidth, h);

        ctx.fillText(labels[i], x, bottom + 20);
        ctx.fillText((p * 100).toFixed(1) + "%", x + 10, y - 10);
    });

    ctx.font = "16px Arial";
    ctx.fillText("Probability Distribution After Temperature Scaling", 180, 25);
}

const slider = document.getElementById("temp");
slider.addEventListener("input", () => draw(parseFloat(slider.value)));

draw(1.0);
</script>
</body>
</html>
